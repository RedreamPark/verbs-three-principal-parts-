<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동사 3단 변화 퀴즈</title>
</head>
<body>
<style>
:root {
  --font-sans: "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
  --color-text-primary: #1a1a1a;
  --color-text-secondary: #666;
  --color-background-primary: #ffffff;
  --color-background-secondary: #f5f3ef;
  --color-border-primary: #999;
  --color-border-secondary: rgba(0,0,0,0.15);
  --color-border-tertiary: rgba(0,0,0,0.08);
  --border-radius-lg: 12px;
  --border-radius-md: 8px;
}
body { background: #F5F3EF; min-height: 100vh; }
* { box-sizing: border-box; margin: 0; padding: 0; }
.wrap { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem; font-family: var(--font-sans); }
h2 { font-size: 20px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 1.5rem; text-align: center; }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
.setting-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.setting-row label { font-size: 14px; color: var(--color-text-secondary); min-width: 80px; }
.setting-row input[type=number] { width: 72px; padding: 6px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 14px; color: var(--color-text-primary); background: var(--color-background-primary); }
.quick-btns { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.qbtn { padding: 5px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 12px; cursor: pointer; background: transparent; color: var(--color-text-secondary); }
.qbtn:hover { background: var(--color-background-secondary); }
.range-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.range-row input[type=number] { width: 68px; padding: 6px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 14px; color: var(--color-text-primary); background: var(--color-background-primary); }
.range-row span { font-size: 14px; color: var(--color-text-secondary); }
.range-preview { font-size: 13px; color: var(--color-text-secondary); padding: 8px 12px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); margin-bottom: 4px; }
.range-preview span { color: var(--color-text-primary); font-weight: 500; }
.btn { display: inline-block; padding: 10px 24px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-primary); font-size: 14px; cursor: pointer; transition: background 0.15s; }
.btn:hover { background: var(--color-background-secondary); }
.btn-primary { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); }
.btn-primary:hover { opacity: 0.85; }
.btn-sm { padding: 5px 12px; font-size: 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; white-space: nowrap; }
.btn-sm:hover { background: var(--color-background-secondary); }
.btn-sm.accept { border-color: #1D9E75; color: #085041; background: #E1F5EE; }
.btn-sm.reject { border-color: #E24B4A; color: #A32D2D; background: #FCEBEB; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.verb-display { font-size: 36px; font-weight: 500; text-align: center; color: var(--color-text-primary); margin: 1rem 0; letter-spacing: 1px; }
.q-label { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.ai-badge { font-size: 10px; padding: 2px 6px; border-radius: 10px; background: #EEEDFE; color: #3C3489; font-weight: 500; }
.q-input { width: 100%; padding: 10px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 15px; color: var(--color-text-primary); background: var(--color-background-primary); margin-bottom: 6px; }
.q-input:focus { outline: none; border-color: var(--color-border-primary); }
.q-input.correct { border-color: #1D9E75; background: #E1F5EE; color: #085041; }
.q-input.correct-ai { border-color: #534AB7; background: #EEEDFE; color: #26215C; }
.q-input.wrong { border-color: #E24B4A; background: #FCEBEB; color: #501313; }
.q-input.checking { border-color: #BA7517; background: #FAEEDA; color: #633806; }
.answer-hint { font-size: 12px; color: #A32D2D; margin-bottom: 10px; min-height: 16px; }
.answer-hint.ai-note { color: #534AB7; }
.timer-bar-wrap { background: var(--color-background-secondary); border-radius: 4px; height: 6px; margin-bottom: 1rem; overflow: hidden; }
.timer-bar { height: 100%; background: #1D9E75; transition: width 1s linear, background 0.5s; border-radius: 4px; }
.timer-bar.warn { background: #BA7517; }
.timer-bar.danger { background: #E24B4A; }
.meta-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--color-text-secondary); margin-bottom: 10px; }
.result-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 1rem 0; }
.stat-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 12px; text-align: center; }
.stat-num { font-size: 28px; font-weight: 500; color: var(--color-text-primary); }
.stat-lbl { font-size: 12px; color: var(--color-text-secondary); margin-top: 4px; }
.pass-msg { text-align: center; font-size: 18px; font-weight: 500; padding: 1rem; border-radius: var(--border-radius-md); margin-bottom: 1rem; }
.pass { background: #E1F5EE; color: #085041; }
.fail { background: #FCEBEB; color: #A32D2D; }
.detail-scroll { max-height: 320px; overflow-y: auto; }
.result-item { padding: 10px 0; border-bottom: 0.5px solid var(--color-border-tertiary); }
.result-item:last-child { border-bottom: none; }
.result-item-top { display: flex; align-items: center; gap: 8px; }
.result-item-detail { font-size: 12px; color: var(--color-text-secondary); margin-top: 4px; padding-left: 36px; }
.student-ans.ok { color: #085041; }
.student-ans.ok-ai { color: #3C3489; }
.student-ans.bad { color: #A32D2D; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: var(--border-radius-md); font-weight: 500; white-space: nowrap; }
.badge-ok { background: #E1F5EE; color: #085041; }
.badge-ai { background: #EEEDFE; color: #3C3489; }
.badge-partial { background: #FAEEDA; color: #633806; }
.badge-fail { background: #FCEBEB; color: #A32D2D; }
.badge-pass { background: #E1F5EE; color: #085041; }
.badge-fail2 { background: #FCEBEB; color: #A32D2D; }
.teacher-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; padding: 6px 10px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); }
.teacher-row span { font-size: 12px; color: var(--color-text-secondary); flex: 1; }
.teacher-changed { font-size: 11px; color: #085041; }
.legend { display: flex; gap: 12px; flex-wrap: wrap; font-size: 12px; margin-bottom: 10px; }
.legend-item { display: flex; align-items: center; gap: 5px; }
.dot { width: 10px; height: 10px; border-radius: 50%; }
.err { font-size: 12px; color: #A32D2D; margin-top: 4px; }
.checking-msg { font-size: 13px; color: #633806; text-align: center; padding: 8px; }
.lock-overlay { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; text-align: center; }
.lock-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
.lock-desc { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 14px; }
.pw-row { display: flex; gap: 8px; justify-content: center; align-items: center; }
.pw-input { width: 160px; padding: 8px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 14px; color: var(--color-text-primary); background: var(--color-background-primary); text-align: center; letter-spacing: 2px; }
.pw-input:focus { outline: none; }
.pw-input.pw-error { border-color: #E24B4A; background: #FCEBEB; }
.pw-err-msg { font-size: 12px; color: #A32D2D; margin-top: 6px; min-height: 16px; }
.unlocked-bar { display: flex; align-items: center; justify-content: space-between; background: #E1F5EE; border-radius: var(--border-radius-md); padding: 8px 14px; margin-bottom: 1rem; }
.unlocked-bar span { font-size: 13px; color: #085041; }
.pw-setting-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
.pw-setting-input { width: 140px; padding: 6px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 14px; color: var(--color-text-primary); background: var(--color-background-primary); letter-spacing: 2px; }
.rec-row { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 0.5px solid var(--color-border-tertiary); font-size: 13px; }
.rec-row:last-child { border-bottom: none; }
.rec-num { font-size: 11px; color: var(--color-text-secondary); min-width: 20px; text-align: right; }
.rec-date { font-size: 12px; color: var(--color-text-secondary); min-width: 110px; }
.rec-range { font-size: 12px; color: var(--color-text-secondary); flex: 1; }
.rec-score { font-size: 15px; font-weight: 500; color: var(--color-text-primary); min-width: 46px; text-align: right; }
.trend-up { color: #1D9E75; font-size: 11px; }
.trend-down { color: #E24B4A; font-size: 11px; }
.trend-same { color: var(--color-text-secondary); font-size: 11px; }
.empty-rec { text-align: center; padding: 2rem; color: var(--color-text-secondary); font-size: 13px; }
.rec-scroll { max-height: 340px; overflow-y: auto; }
.mini-chart { display: flex; align-items: flex-end; gap: 3px; height: 48px; margin: 12px 0 4px; }
.mini-bar-wrap { display: flex; flex-direction: column; align-items: center; flex: 1; gap: 2px; }
.mini-bar { width: 100%; border-radius: 2px 2px 0 0; }
.mini-label { font-size: 9px; color: var(--color-text-secondary); }
.storage-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 3px 8px; border-radius: var(--border-radius-md); background: #E1F5EE; color: #085041; margin-bottom: 10px; }
.storage-badge.loading { background: #FAEEDA; color: #633806; }
.storage-badge.error { background: #FCEBEB; color: #A32D2D; }
#screen-settings, #screen-quiz, #screen-result, #screen-records { display: none; }

.academy-header{display:flex;justify-content:center;padding:20px 0 12px;margin-bottom:0;background:#F5F3EF;}
.academy-logo{height:52px;width:auto;object-fit:contain;background:#F5F3EF;mix-blend-mode:multiply;}
.rec-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); margin-bottom: 8px; overflow: hidden; }
.rec-card .rec-row { display: flex; align-items: center; gap: 8px; padding: 10px 12px; flex-wrap: wrap; }
.rec-card .rec-row:hover { background: var(--color-background-secondary); }
.toggle-btn { font-size: 11px; color: var(--color-text-secondary); margin-left: auto; white-space: nowrap; }
.wrongs-detail { border-top: 0.5px solid var(--color-border-tertiary); padding: 10px 12px; background: #fafafa; }
.wrongs-item { padding: 8px 10px; border-radius: var(--border-radius-md); background: #fff; border: 0.5px solid var(--color-border-tertiary); margin-bottom: 6px; }
.wrongs-item:last-child { margin-bottom: 0; }
.wrongs-verb { font-size: 13px; color: var(--color-text-primary); display: block; margin-bottom: 4px; }
.wrongs-row { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
.timeout-tag { font-size: 10px; background: #FAEEDA; color: #633806; padding: 1px 6px; border-radius: 99px; font-weight: 500; }
</style>

  <div id="screen-settings">

      <div class="quick-btns">
        <button class="qbtn" onclick="setRange(1,30)">1 – 30</button>
        <button class="qbtn" onclick="setRange(31,60)">31 – 60</button>
        <button class="qbtn" onclick="setRange(61,90)">61 – 90</button>

        <span>번</span>
      </div>

      <div class="err" id="range-err"></div>
    </div>
    <div class="card">
      <div class="setting-row"><label>문항 수</label><input type="number" id="cfg-count" value="10" min="1" max="126"><span style="font-size:13px;color:var(--color-text-secondary)" id="count-max-hint"></span></div>
      <div class="setting-row"><label>커트라인</label><input type="number" id="cfg-cut" value="70" min="0" max="100"><span style="font-size:13px;color:var(--color-text-secondary)">% 이상 합격</span></div>

let questions=[], qIndex=0, results=[], timerInterval=null, timeLeft=30, answered=false, teacherUnlocked=false;
let quizRange={from:1,to:30};
let recordHistory=[];
let currentRecordIdx=-1;
let storageAvailable=false;

// ── 영구 저장 (localStorage) ──
async function loadRecords(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const parsed = raw ? JSON.parse(raw) : [];
    if(Array.isArray(parsed)) recordHistory=parsed;
    storageAvailable=true;
  } catch(e){
    storageAvailable=false;
    recordHistory=[];
  }
}

async function persistRecords(){
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(recordHistory));
    storageAvailable=true;
  } catch(e){
    storageAvailable=false;
  }
}

function norm(s){ return s.trim().toLowerCase().replace(/\s+/g,' '); }
function checkExact(u,correct){ return correct.split('/').map(v=>norm(v)).some(v=>norm(u)===v); }
function shuffle(arr){ let a=[...arr]; for(let i=a.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function show(id){ ['screen-settings','screen-quiz','screen-result','screen-records'].forEach(s=>document.getElementById(s).style.display='none'); document.getElementById(id).style.display='block'; }
function goSettings(){ clearTimer(); teacherUnlocked=false; show('screen-settings'); updatePreview(); }
function setRange(f,t){ document.getElementById('range-from').value=f; document.getElementById('range-to').value=t; updatePreview(); }
function getPassword(){ return document.getElementById('cfg-password').value; }

function updatePreview(){
  const f=parseInt(document.getElementById('range-from').value)||1, t=parseInt(document.getElementById('range-to').value)||126;
  const err=document.getElementById('range-err');
  if(f<1||t>126||f>t){ err.textContent='올바른 범위를 입력해주세요 (1~126, 시작 ≤ 끝)'; document.getElementById('range-preview').innerHTML=''; document.getElementById('start-btn').disabled=true; return; }
  err.textContent='';
  const cnt=ALL_VERBS.filter(v=>v.n>=f&&v.n<=t).length;
  document.getElementById('range-preview').innerHTML=`선택된 범위: <span>${f}번 ~ ${t}번</span> &nbsp;|&nbsp; 총 <span>${cnt}개</span> 단어`;
  document.getElementById('count-max-hint').textContent=`(최대 ${cnt}개)`;
  const ci=document.getElementById('cfg-count'); if(parseInt(ci.value)>cnt) ci.value=cnt; ci.max=cnt;
  document.getElementById('start-btn').disabled=false;
}

function startQuiz(){
  clearTimer(); teacherUnlocked=false;
  const f=parseInt(document.getElementById('range-from').value)||1, t=parseInt(document.getElementById('range-to').value)||126;
  quizRange={from:f,to:t};
  const pool=ALL_VERBS.filter(v=>v.n>=f&&v.n<=t);
  const cnt=Math.min(Math.max(parseInt(document.getElementById('cfg-count').value)||10,1),pool.length);
  document.getElementById('cfg-count').value=cnt;
  questions=shuffle(pool).slice(0,cnt); qIndex=0; results=[];
  show('screen-quiz'); loadQuestion();
}

function loadQuestion(){
  answered=false;
  const q=questions[qIndex];
  document.getElementById('q-counter').textContent=`문제 ${qIndex+1} / ${questions.length}`;
  document.getElementById('q-num-badge').textContent=`목록 ${q.n}번`;
  document.getElementById('verb-present').textContent=q.present;
  ['past','pp','mean'].forEach(k=>{ const i=document.getElementById('inp-'+k); i.value=''; i.className='q-input'; i.disabled=false; });
  ['hint-past','hint-pp','hint-mean'].forEach(id=>{ const h=document.getElementById(id); h.textContent=''; h.className='answer-hint'; });
  document.getElementById('checking-msg').style.display='none';
  document.getElementById('submit-btn').disabled=false;
  document.getElementById('inp-past').focus();
  startTimer();
}

function startTimer(){ clearTimer(); timeLeft=30; updateTimerUI(); timerInterval=setInterval(()=>{ timeLeft--; updateTimerUI(); if(timeLeft<=0){ clearTimer(); timeUp(); } },1000); }
function clearTimer(){ if(timerInterval){ clearInterval(timerInterval); timerInterval=null; } }
function updateTimerUI(){
  const pct=(timeLeft/30)*100, bar=document.getElementById('timer-bar');
  bar.style.width=pct+'%'; bar.className='timer-bar'+(timeLeft<=10?' danger':timeLeft<=20?' warn':'');
  document.getElementById('timer-text').textContent=`⏱ ${timeLeft}초`;
}
function timeUp(){ if(!answered) submitAnswer(true); }

async function checkMeaningWithAI(verbPresent,correctMean,userInput){
  if(!userInput.trim()) return {ok:false};
  const prompt=`영어 동사 "${verbPresent}"의 한국어 뜻 채점.\n정답: "${correctMean}"\n학생 답변: "${userInput}"\n비슷한 의미면 정답 인정. 딱 한 줄: OK 또는 FAIL`;
  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:10,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    return {ok:(data.content[0]?.text||'').trim().toUpperCase().startsWith('OK'),aiUsed:true};
  } catch(e){ return {ok:checkExact(userInput,correctMean),aiUsed:false}; }
}

async function submitAnswer(timedOut=false){
  if(answered) return;
  answered=true; clearTimer();
  document.getElementById('submit-btn').disabled=true;
  const q=questions[qIndex];
  const pastInp=document.getElementById('inp-past'), ppInp=document.getElementById('inp-pp'), meanInp=document.getElementById('inp-mean');
  pastInp.disabled=true; ppInp.disabled=true; meanInp.disabled=true;
  const pastOk=checkExact(pastInp.value,q.past), ppOk=checkExact(ppInp.value,q.pp);
  pastInp.className='q-input '+(pastOk?'correct':'wrong'); ppInp.className='q-input '+(ppOk?'correct':'wrong');
  if(!pastOk) document.getElementById('hint-past').textContent=`정답: ${q.past}`;
  if(!ppOk) document.getElementById('hint-pp').textContent=`정답: ${q.pp}`;
  let meanOk=false,aiUsed=false;
  const userMean=meanInp.value.trim();
  if(checkExact(userMean,q.mean)){ meanOk=true; meanInp.className='q-input correct'; }
  else if(userMean){
    meanInp.className='q-input checking'; document.getElementById('checking-msg').style.display='block';
    const r=await checkMeaningWithAI(q.present,q.mean,userMean);
    document.getElementById('checking-msg').style.display='none';
    meanOk=r.ok; aiUsed=r.aiUsed;
    if(meanOk){ meanInp.className='q-input correct-ai'; const h=document.getElementById('hint-mean'); h.textContent=`AI 인정 정답 ✓  (정답: ${q.mean})`; h.className='answer-hint ai-note'; }
    else { meanInp.className='q-input wrong'; document.getElementById('hint-mean').textContent=`정답: ${q.mean}`; }
  } else { meanInp.className='q-input wrong'; document.getElementById('hint-mean').textContent=`정답: ${q.mean}`; }
  results.push({n:q.n,verb:q.present,past:q.past,pp:q.pp,mean:q.mean,userPast:pastInp.value,userPp:ppInp.value,userMean,pastOk,ppOk,meanOk,aiUsed,timedOut,teacherOverride:null});
  setTimeout(()=>{ qIndex++; if(qIndex<questions.length) loadQuestion(); else showResult(); },1400);
}

function calcStats(){
  const total=results.length; let correct=0;
  results.forEach(r=>{ const mo=r.teacherOverride!==null?r.teacherOverride:r.meanOk; if(r.pastOk&&r.ppOk&&mo) correct++; });
  return {total,correct,wrong:total-correct,score:Math.round((correct/total)*100)};
}

function updateSummary(){
  const {correct,wrong,score}=calcStats();
  const cut=parseInt(document.getElementById('cfg-cut').value)||70, pass=score>=cut;
  document.getElementById('pass-msg').textContent=pass?`합격! ${score}점 (커트라인 ${cut}점)`:`불합격 ${score}점 (커트라인 ${cut}점)`;
  document.getElementById('pass-msg').className='pass-msg '+(pass?'pass':'fail');
  document.getElementById('r-score').textContent=score+'점';
  document.getElementById('r-correct').textContent=correct+'개';
  document.getElementById('r-wrong').textContent=wrong+'개';
}

function renderTeacherSection(){
  const sec=document.getElementById('teacher-section'), pw=getPassword();
  if(!pw){ sec.innerHTML=''; return; }
  if(!teacherUnlocked){
    sec.innerHTML=`<div class="lock-overlay"><div style="font-size:24px;margin-bottom:8px">🔒</div><div class="lock-title">선생님 채점 수정</div><div class="lock-desc">채점을 수정하려면 선생님 비밀번호를 입력하세요.</div><div class="pw-row"><input type="password" class="pw-input" id="pw-input-result" placeholder="비밀번호 입력" maxlength="20" onkeydown="if(event.key==='Enter')tryUnlock()"><button class="btn btn-primary" onclick="tryUnlock()" style="padding:8px 16px;font-size:13px">확인</button></div><div class="pw-err-msg" id="pw-err"></div></div>`;
  } else {
    sec.innerHTML=`<div class="unlocked-bar"><span>🔓 선생님 모드 활성화</span><button class="btn-sm" onclick="lockTeacher()">잠금</button></div>`;
    renderAllItems();
  }
}

function tryUnlock(){
  const input=document.getElementById('pw-input-result'), err=document.getElementById('pw-err');
  if(!input) return;
  if(input.value===getPassword()){ teacherUnlocked=true; renderTeacherSection(); renderAllItems(); }
  else { input.classList.add('pw-error'); err.textContent='비밀번호가 틀렸어요.'; setTimeout(()=>{ input.classList.remove('pw-error'); input.value=''; },1200); }
}
function lockTeacher(){ teacherUnlocked=false; renderTeacherSection(); renderAllItems(); }

async function teacherOverride(idx,val){
  results[idx].teacherOverride=val;
  updateSummary(); renderResultItem(idx);
  if(currentRecordIdx>=0){
    const {score,correct,total}=calcStats();
    const cut=parseInt(document.getElementById('cfg-cut').value)||70;
    Object.assign(recordHistory[currentRecordIdx],{score,correct,total,pass:score>=cut});
    await persistRecords();
  }
}

function renderAllItems(){ results.forEach((_,i)=>renderResultItem(i)); }

function renderResultItem(idx){
  const el=document.getElementById('result-item-'+idx); if(!el) return;
  const r=results[idx];
  const mo=r.teacherOverride!==null?r.teacherOverride:r.meanOk;
  const allOk=r.pastOk&&r.ppOk&&mo, correctCount=(r.pastOk?1:0)+(r.ppOk?1:0)+(mo?1:0), partial=!allOk&&correctCount>0;
  let badgeClass,badgeText;
  if(allOk&&r.teacherOverride===true){badgeClass='badge-ok';badgeText='정답 (선생님 인정)';}
  else if(allOk&&r.aiUsed&&r.meanOk&&r.teacherOverride===null){badgeClass='badge-ai';badgeText='정답 (AI 인정)';}
  else if(allOk){badgeClass='badge-ok';badgeText='정답';}
  else if(partial){badgeClass='badge-partial';badgeText=`부분 (${correctCount}/3)`;}
  else{badgeClass='badge-fail';badgeText='오답'+(r.timedOut?' (시간초과)':'');}
  const pastC=r.pastOk?'ok':'bad', ppC=r.ppOk?'ok':'bad', meanC=mo?(r.teacherOverride===true?'ok':(r.aiUsed&&r.meanOk?'ok-ai':'ok')):'bad';
  let teacherHTML='';
  if(teacherUnlocked){
    if(!mo&&r.userMean&&r.teacherOverride===null) teacherHTML=`<div class="teacher-row"><span>학생 답변 "<strong>${r.userMean}</strong>" — 정답으로 인정하시겠어요?</span><button class="btn-sm accept" onclick="teacherOverride(${idx},true)">✓ 인정</button><button class="btn-sm reject" onclick="teacherOverride(${idx},false)">✗ 오답 유지</button></div>`;
    else if(r.teacherOverride===true) teacherHTML=`<div class="teacher-row"><span class="teacher-changed">선생님이 정답으로 인정했어요</span><button class="btn-sm" onclick="teacherOverride(${idx},null)">되돌리기</button></div>`;
    else if(r.teacherOverride===false) teacherHTML=`<div class="teacher-row"><span style="font-size:12px;color:#A32D2D">오답으로 확정됨</span><button class="btn-sm" onclick="teacherOverride(${idx},null)">되돌리기</button></div>`;
    else if(mo&&r.userMean&&r.teacherOverride===null) teacherHTML=`<div class="teacher-row"><span>정답으로 처리됨 — 오답으로 바꾸시겠어요?</span><button class="btn-sm reject" onclick="teacherOverride(${idx},false)">✗ 오답으로</button></div>`;
  }
  el.innerHTML=`<div class="result-item-top"><span style="color:var(--color-text-secondary);font-size:12px;min-width:28px">${r.n}번</span><span style="font-weight:500;color:var(--color-text-primary);min-width:72px">${r.verb}</span><span class="badge ${badgeClass}" style="margin-left:auto">${badgeText}</span></div><div class="result-item-detail">과거형: <span class="student-ans ${pastC}">${r.userPast||'(미입력)'}</span> → ${r.past} &nbsp; 과거분사: <span class="student-ans ${ppC}">${r.userPp||'(미입력)'}</span> → ${r.pp} &nbsp; 뜻: <span class="student-ans ${meanC}">${r.userMean||'(미입력)'}</span> → ${r.mean}</div>${teacherHTML}`;
}

async function showResult(){
  show('screen-result');
  const {correct,total,score}=calcStats();
  const cut=parseInt(document.getElementById('cfg-cut').value)||70, pass=score>=cut;
  const now=new Date(), pad=n=>String(n).padStart(2,'0');
  const dateStr=`${now.getFullYear()}.${pad(now.getMonth()+1)}.${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  // 오답 데이터 저장
  const wrongs = results.filter(r => {
    const mo = r.teacherOverride !== null ? r.teacherOverride : r.meanOk;
    return !(r.pastOk && r.ppOk && mo);
  }).map(r => ({
    n: r.n, verb: r.verb, past: r.past, pp: r.pp, mean: r.mean,
    userPast: r.userPast, userPp: r.userPp, userMean: r.userMean,
    pastOk: r.pastOk, ppOk: r.ppOk,
    meanOk: r.teacherOverride !== null ? r.teacherOverride : r.meanOk,
    timedOut: r.timedOut
  }));
  recordHistory.push({date:dateStr,score,correct,total,pass,rangeFrom:quizRange.from,rangeTo:quizRange.to,cut,wrongs});
  currentRecordIdx=recordHistory.length-1;
  await persistRecords();
  updateSummary(); renderTeacherSection();
  const list=document.getElementById('detail-list'); list.innerHTML='';
  results.forEach((_,i)=>{ const d=document.createElement('div'); d.className='result-item'; d.id='result-item-'+i; list.appendChild(d); renderResultItem(i); });
}

async function showRecords(){
  show('screen-records');
  const pw=getPassword();
  document.getElementById('rec-delete-btn').innerHTML=pw?`<button class="btn-sm" onclick="promptDeleteRecords()">기록 삭제</button>`:'';

  // 저장 상태 배지
  const statusEl=document.getElementById('storage-status');
  statusEl.innerHTML=storageAvailable
    ? `<div class="storage-badge" style="margin-bottom:10px">💾 로컬 저장 중 — 브라우저를 닫아도 기록이 유지돼요</div>`
    : `<div class="storage-badge error" style="margin-bottom:10px">⚠️ 저장 불가 — 이 브라우저에서는 localStorage가 지원되지 않아요</div>`;

  const list=document.getElementById('rec-list');
  if(recordHistory.length===0){ list.innerHTML=`<div class="empty-rec">아직 테스트 기록이 없어요.<br>퀴즈를 풀면 여기에 기록이 쌓여요!</div>`; document.getElementById('mini-chart-wrap').innerHTML=''; return; }

  const recent=recordHistory.slice(-10);
  let chartHTML=`<div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:6px">최근 점수 추이</div><div class="mini-chart">`;
  recent.forEach(r=>{ const h=Math.max(4,Math.round((r.score/100)*44)), col=r.pass?'#1D9E75':'#E24B4A'; chartHTML+=`<div class="mini-bar-wrap"><div class="mini-bar" style="height:${h}px;background:${col}"></div><div class="mini-label">${r.score}</div></div>`; });
  chartHTML+='</div>';
  document.getElementById('mini-chart-wrap').innerHTML=chartHTML;

  list.innerHTML='';
  const sorted=[...recordHistory].reverse();
  sorted.forEach((r,i)=>{
    const prev=sorted[i+1];
    const trend=prev?(r.score>prev.score?'▲':r.score<prev.score?'▼':'–'):'';
    const trendClass=trend==='▲'?'trend-up':trend==='▼'?'trend-down':'trend-same';
    const hasWrongs = r.wrongs && r.wrongs.length > 0;
    const recId = `rec-detail-${i}`;
    const div=document.createElement('div'); div.className='rec-card';

    let wrongsHTML = '';
    if(hasWrongs){
      const items = r.wrongs.map(w => {
        const pastC = w.pastOk ? 'ok' : 'bad';
        const ppC   = w.ppOk   ? 'ok' : 'bad';
        const meanC = w.meanOk  ? 'ok' : 'bad';
        return `<div class="wrongs-item">
          <span class="wrongs-verb">${w.n}번 <strong>${w.verb}</strong>${w.timedOut?' <span class="timeout-tag">시간초과</span>':''}</span>
          <div class="wrongs-row">과거형: <span class="student-ans ${pastC}">${w.userPast||'(미입력)'}</span> → <strong>${w.past}</strong></div>
          <div class="wrongs-row">과거분사: <span class="student-ans ${ppC}">${w.userPp||'(미입력)'}</span> → <strong>${w.pp}</strong></div>
          <div class="wrongs-row">뜻: <span class="student-ans ${meanC}">${w.userMean||'(미입력)'}</span> → <strong>${w.mean}</strong></div>
        </div>`;
      }).join('');
      wrongsHTML = `<div class="wrongs-detail" id="${recId}" style="display:none">${items}</div>`;
    }

    div.innerHTML=`
      <div class="rec-row" onclick="${hasWrongs?`toggleRecDetail('${recId}',this)`:''}" style="${hasWrongs?'cursor:pointer':''}">
        <span class="rec-num">${recordHistory.length-i}</span>
        <span class="rec-date">${r.date}</span>
        <span class="rec-range">${r.rangeFrom}–${r.rangeTo}번 / ${r.total}문항</span>
        <span class="${trendClass}">${trend}</span>
        <span class="rec-score">${r.score}점</span>
        <span class="badge ${r.pass?'badge-pass':'badge-fail2'}">${r.pass?'합격':'불합격'}</span>
        ${hasWrongs?`<span class="toggle-btn" id="toggle-${recId}">오답 보기 ▼</span>`:'<span style="font-size:11px;color:#1D9E75">✓ 모두 정답</span>'}
      </div>
      ${wrongsHTML}`;
    list.appendChild(div);
  });
}

function toggleRecDetail(id, rowEl){
  const el = document.getElementById(id);
  const btn = document.getElementById('toggle-'+id);
  if(!el) return;
  const isOpen = el.style.display !== 'none';
  el.style.display = isOpen ? 'none' : 'block';
  if(btn) btn.textContent = isOpen ? '오답 보기 ▼' : '닫기 ▲';
}

async function promptDeleteRecords(){
  const pw=getPassword(); if(!pw) return;
  const entered=prompt('기록을 모두 삭제하려면 선생님 비밀번호를 입력하세요.');
  if(entered===null) return;
  if(entered===pw){
    recordHistory=[]; currentRecordIdx=-1;
    await persistRecords();
    showRecords();
  } else { alert('비밀번호가 틀렸어요.'); }
}

// ── 초기화 ──
async function init(){
  await loadRecords();
  show('screen-settings');
  updatePreview();
}
init();
</script>

</html>
